<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTC Arrivals</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f4f4f2; --bg3: #ebebea;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --success: #3b6d11; --success-bg: #eaf3de;
    --warn: #854f0b; --warn-bg: #faeeda;
    --danger: #a32d2d; --danger-bg: #fcebeb;
    --accent: #DA251D; --accent-bg: #fdecea;
    --accent2: #1a1a18;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333330;
      --text: #f0efe8; --text2: #b4b2a9; --text3: #888780;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --success: #c0dd97; --success-bg: #173404;
      --warn: #FAC775; --warn-bg: #412402;
      --danger: #f09595; --danger-bg: #501313;
      --accent: #f05550; --accent-bg: #3a0a09;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  header { padding: 16px 16px 0; background: var(--accent); color: #fff; }
  header h1 { font-size: 18px; font-weight: 700; margin-bottom: 2px; color: #fff; }
  header p { font-size: 12px; color: rgba(255,255,255,0.75); margin-bottom: 12px; }
  .tabs { display: flex; }
  .tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.65); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: #fff; border-bottom-color: #fff; }

  /* Mode filter */
  .mode-bar { display: flex; gap: 6px; padding: 10px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg); overflow-x: auto; }
  .mode-btn { flex-shrink: 0; padding: 5px 12px; border: 0.5px solid var(--border2); border-radius: 99px; font-size: 12px; font-weight: 500; cursor: pointer; background: var(--bg); color: var(--text2); white-space: nowrap; }
  .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Search */
  .search-bar { padding: 10px 16px; display: flex; gap: 8px; border-bottom: 0.5px solid var(--border); }
  .search-bar input { flex: 1; height: 40px; padding: 0 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 15px; }
  .search-bar input:focus { outline: none; border-color: var(--accent); }
  .search-bar button { height: 40px; padding: 0 16px; border: none; border-radius: var(--radius); background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .search-bar button:active { opacity: 0.8; }

  /* Breadcrumb */
  .breadcrumb { padding: 8px 16px; font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; border-bottom: 0.5px solid var(--border); min-height: 34px; background: var(--bg2); }
  .breadcrumb span { color: var(--text); font-weight: 500; }
  .breadcrumb a { color: var(--text2); cursor: pointer; text-decoration: underline; }

  /* Content */
  .content { flex: 1; padding: 12px 16px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }

  /* Cards */
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; }
  .card-header { padding: 12px 14px 10px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
  .card-header-left h2 { font-size: 14px; font-weight: 500; }
  .card-header-left p { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* Route list */
  .route-item { display: flex; align-items: center; padding: 11px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; gap: 10px; }
  .route-item:last-child { border-bottom: none; }
  .route-item:active { background: var(--bg2); }
  .route-num { font-size: 14px; font-weight: 700; min-width: 44px; color: var(--accent); }
  .route-name { font-size: 13px; color: var(--text); flex: 1; }
  .route-type { font-size: 11px; color: var(--text3); }
  .route-arrow { color: var(--text3); font-size: 16px; flex-shrink: 0; }

  /* Direction grid */
  .dir-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
  .dir-tile { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 18px 12px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; }
  .dir-tile:active { background: var(--bg3); }
  .dir-arrow { font-size: 24px; color: var(--text2); }
  .dir-label { font-size: 13px; font-weight: 500; text-align: center; }

  /* Stop list */
  .list-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; }
  .list-item:last-child { border-bottom: none; }
  .list-item:active { background: var(--bg2); }
  .list-item-name { font-size: 13px; color: var(--text); }
  .list-item-arrow { color: var(--text3); font-size: 16px; flex-shrink: 0; margin-left: 8px; }

  /* Arrivals */
  .arrival-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 0.5px solid var(--border); }
  .arrival-row:last-child { border-bottom: none; }
  .arrival-route { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 2px; }
  .arrival-dest { font-size: 13px; color: var(--text); }
  .arrival-detail { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .arrival-time { font-size: 18px; font-weight: 700; flex-shrink: 0; margin-left: 12px; }
  .t-now  { color: var(--danger); }
  .t-soon { color: var(--warn); }
  .t-ok   { color: var(--success); }
  .t-later{ color: var(--text3); }

  /* Badges */
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 99px; margin-left: 6px; vertical-align: middle; }
  .badge-live  { background: var(--success-bg); color: var(--success); }
  .badge-sched { background: var(--bg2); color: var(--text3); }
  .badge-near  { background: var(--accent-bg); color: var(--accent); }

  /* Fav button */
  .fav-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 0 0 0 8px; line-height: 1; flex-shrink: 0; }

  /* Refresh bar */
  .progress-bar { height: 3px; background: var(--border); }
  .progress-fill { height: 100%; background: var(--accent); transition: width 1s linear; }
  .refresh-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; font-size: 12px; color: var(--text3); background: var(--bg2); border-top: 0.5px solid var(--border); }
  .refresh-bar button { background: none; border: 0.5px solid var(--border2); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--text2); cursor: pointer; }

  /* Favourites */
  .fav-item { display: flex; align-items: center; padding: 12px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; gap: 12px; }
  .fav-item:last-child { border-bottom: none; }
  .fav-item:active { background: var(--bg2); }
  .fav-info { flex: 1; }
  .fav-name { font-size: 14px; font-weight: 500; }
  .fav-sub  { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .fav-delete { background: none; border: none; font-size: 18px; color: var(--text3); cursor: pointer; padding: 4px; flex-shrink: 0; }


  /* Misc */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.7; }
  .empty .icon { font-size: 36px; margin-bottom: 8px; }
  .spinner-wrap { display: flex; align-items: center; gap: 10px; padding: 20px 0; color: var(--text3); font-size: 13px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { background: var(--danger-bg); color: var(--danger); border-radius: var(--radius); padding: 12px; font-size: 13px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🚌 TTC Arrivals</h1>
    <p>Toronto Transit Commission · live data</p>
    <div class="tabs">
      <div class="tab active" id="tab-search" onclick="switchTab('search')">Search</div>
      <div class="tab" id="tab-favs"   onclick="switchTab('favs')">⭐ Favourites</div>
    </div>
  </header>

  <div id="search-panel">
    <div class="mode-bar">
      <button class="mode-btn active" id="mode-all"       onclick="setMode('all')">All</button>
      <button class="mode-btn"        id="mode-bus"       onclick="setMode('bus')">🚌 Bus</button>
      <button class="mode-btn"        id="mode-streetcar" onclick="setMode('streetcar')">🚋 Streetcar</button>
    </div>
    <div class="search-bar">
      <input id="route-input" type="text" inputmode="numeric" placeholder="Route number (e.g. 501, 29, 1)" />
      <button onclick="searchRoute()">Go</button>
    </div>

    <div class="breadcrumb" id="breadcrumb" style="display:none;"></div>
    <div class="content" id="content">
      <div class="empty"><div class="icon">🚌</div>Enter a route number to get started.<br>Try <b>501</b> (Queen streetcar) or <b>29</b> (Dufferin bus).<br><small style='color:var(--text3)'>Note: subway lines are not available via this data source.</small></div>
    </div>
  </div>

  <div id="favs-panel" style="display:none;">
    <div class="content" id="favs-content"></div>
  </div>
</div>

<script>
  const API = "/api";
  const REFRESH_INTERVAL = 30;
  let state = { routeId: null, routeName: null, direction: null, currentStop: null, _directions: [], _stops: [] };
  let mode = 'all';
  let refreshTimer = null;
  let refreshCountdown = REFRESH_INTERVAL;



  // ── Mode filter ───────────────────────────────────────────────────────────
  function setMode(m) {
    mode = m;
    ['all','bus','streetcar'].forEach(x => {
      document.getElementById('mode-'+x).className = 'mode-btn' + (x === m ? ' active' : '');
    });
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('tab-search').className = 'tab' + (tab==='search'?' active':'');
    document.getElementById('tab-favs').className   = 'tab' + (tab==='favs'?' active':'');
    document.getElementById('search-panel').style.display = tab==='search' ? '' : 'none';
    document.getElementById('favs-panel').style.display   = tab==='favs'   ? '' : 'none';
    if (tab==='favs') renderFavs();
  }

  // ── Favourites ────────────────────────────────────────────────────────────
  function getFavs() { try { return JSON.parse(localStorage.getItem('ttc-favs')||'[]'); } catch { return []; } }
  function saveFavs(f) { localStorage.setItem('ttc-favs', JSON.stringify(f)); }
  function isFav(stopId, routeId) { return getFavs().some(f => f.stopId===stopId && f.routeId===routeId); }

  function toggleFav(stop, routeId, routeName, dirLabel) {
    let favs = getFavs();
    const idx = favs.findIndex(f => f.stopId===stop.stop_id && f.routeId===routeId);
    if (idx >= 0) favs.splice(idx, 1);
    else favs.push({ stopId: stop.stop_id, stopName: stop.name, routeId, routeName, dirLabel });
    saveFavs(favs);
    return idx < 0;
  }

  function renderFavs() {
    const favs = getFavs();
    const el = document.getElementById('favs-content');
    if (!favs.length) {
      el.innerHTML = '<div class="empty"><div class="icon">⭐</div>No favourites yet.<br>Search for a stop and tap ☆ to save it.</div>'; return;
    }
    el.innerHTML = '<div class="section-label" style="margin-top:4px;">Saved stops</div><div class="card">' +
      favs.map((f,i) => `<div class="fav-item" onclick="loadFav(${i})">
        <div style="font-size:20px;">📍</div>
        <div class="fav-info"><div class="fav-name">${f.stopName}</div><div class="fav-sub">Route ${f.routeName} · ${f.dirLabel}</div></div>
        <button class="fav-delete" onclick="deleteFav(event,${i})">✕</button>
      </div>`).join('') + '</div>';
  }

  function deleteFav(e, idx) { e.stopPropagation(); const f=getFavs(); f.splice(idx,1); saveFavs(f); renderFavs(); }

  function loadFav(idx) {
    const fav = getFavs()[idx]; if (!fav) return;
    switchTab('search');
    document.getElementById('route-input').value = fav.routeName;
    state.routeId = fav.routeId;
    state.routeName = fav.routeName;
    state.direction = { headsign: fav.dirLabel };
    state.currentStop = { stop_id: fav.stopId, name: fav.stopName };
    setBreadcrumb([`<a onclick="searchRoute()">Route ${fav.routeName}</a>`, `<span>${fav.stopName}</span>`]);
    loadArrivals({ stop_id: fav.stopId, name: fav.stopName });
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setContent(html) { document.getElementById('content').innerHTML = html; }
  function loading(msg) { setContent('<div class="spinner-wrap"><div class="spinner"></div>'+msg+'</div>'); }
  function setBreadcrumb(parts) {
    const el = document.getElementById('breadcrumb');
    el.style.display = parts.length ? 'flex' : 'none';
    el.innerHTML = parts.map((p,i) => i<parts.length-1 ? p+' <span style="color:var(--text3)">›</span>' : p).join(' ');
  }
  async function apiFetch(url) {
    const r = await fetch(url); if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json(); if (d.error) throw new Error(d.error); return d;
  }
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }

  // ── Search route ──────────────────────────────────────────────────────────
  document.getElementById('route-input').addEventListener('keydown', e => { if (e.key==='Enter') searchRoute(); });

  async function searchRoute() {
    stopRefresh();
    const q = document.getElementById('route-input').value.trim(); if (!q) return;
    loading('Searching for route '+q+'…');
    setBreadcrumb([]);
    try {
      // Get all routes and find by short_name
      const data = await apiFetch(API+'/routes'+(mode!=='all'?'?mode='+mode:''));
      const matches = data.routes.filter(r => r.short_name === q || r.short_name.toLowerCase() === q.toLowerCase());
      if (!matches.length) {
        setContent('<div class="err">Route '+q+' not found. Check the number and try again.</div>'); return;
      }
      if (matches.length === 1) {
        pickRoute(matches[0]);
      } else {
        showRouteMatches(matches, q);
      }
    } catch(e) {
      setContent('<div class="err">'+e.message+'</div>');
    }
  }

  function showRouteMatches(routes, q) {
    const items = routes.map((r,i) =>
      `<div class="route-item" onclick="pickRouteIdx(${i})">
        <div class="route-num">${r.icon} ${r.short_name}</div>
        <div><div class="route-name">${r.long_name}</div><div class="route-type">${r.type}</div></div>
        <div class="route-arrow">›</div>
      </div>`).join('');
    state._routeMatches = routes;
    setContent('<div class="section-label">Multiple matches for "'+q+'"</div><div class="card">'+items+'</div>');
  }

  function pickRouteIdx(i) { pickRoute(state._routeMatches[i]); }

  async function pickRoute(route) {
    state.routeId   = route.route_id;
    state.routeName = route.short_name;
    setBreadcrumb([`<span>Route ${route.short_name} — ${route.long_name}</span>`]);
    loading('Loading directions for route '+route.short_name+'…');
    try {
      const data = await apiFetch(API+'/routes/'+encodeURIComponent(route.route_id)+'/directions');
      showDirections(data);
    } catch(e) {
      setContent('<div class="err">'+e.message+'</div>');
    }
  }

  // ── Directions ────────────────────────────────────────────────────────────
  function showDirections(data) {
    if (!data.directions || !data.directions.length) {
      setContent('<div class="err">No directions found for this route.</div>'); return;
    }
    state._directions = data.directions;
    const tiles = data.directions.map((d,i) =>
      `<div class="dir-tile" onclick="pickDirection(${i})">
        <div class="dir-arrow">${d.arrow}</div>
        <div class="dir-label">${d.headsign}</div>
      </div>`).join('');
    setContent(
      '<div class="section-label">Choose direction</div>' +
      '<div class="card"><div class="card-header"><div class="card-header-left">' +
      '<h2>Route '+state.routeName+'</h2><p>Which way are you heading?</p>' +
      '</div></div><div class="dir-grid">'+tiles+'</div></div>');
  }

  function pickDirection(idx) {
    const dir = state._directions[idx]; state.direction = dir;
    setBreadcrumb([`<a onclick="backToDirections()">Route ${state.routeName}</a>`, '<span>'+dir.headsign+'</span>']);
    showStops(dir, null, null);
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => showStops(dir, pos.coords.latitude, pos.coords.longitude),
        () => {},
        { timeout: 5000, enableHighAccuracy: false }
      );
    }
  }

  function backToDirections() {
    stopRefresh(); state.direction = null;
    setBreadcrumb([`<span>Route ${state.routeName}</span>`]);
    showDirections({ directions: state._directions });
  }

  // ── Stops ─────────────────────────────────────────────────────────────────
  function showStops(dir, userLat, userLon) {
    state._stops = dir.stops;
    let nearestIdx = -1, nearestDist = Infinity;
    if (userLat != null) {
      dir.stops.forEach((s,i) => {
        if (s.lat && s.lon) {
          const d = haversine(userLat, userLon, s.lat, s.lon);
          if (d < nearestDist) { nearestDist = d; nearestIdx = i; }
        }
      });
    }
    const items = dir.stops.map((s,i) => {
      const isNearest = i === nearestIdx;
      const dist = isNearest ? Math.round(nearestDist) : 0;
      const distStr = dist >= 1000 ? (dist/1000).toFixed(1)+' km' : dist+' m';
      const nearTag = isNearest
        ? '<span class="badge badge-near">📍 Nearest · '+distStr+'</span>'
        : '';
      return '<div class="list-item" id="stop-item-'+i+'" onclick="pickStop('+i+')">' +
        '<div class="list-item-name" style="'+(isNearest?'font-weight:700;':'')+'">'+s.name+nearTag+'</div>' +
        '<div class="list-item-arrow">›</div></div>';
    }).join('');

    const note = nearestIdx >= 0
      ? '<p style="font-size:11px;color:var(--text3);padding:8px 14px 0;">Nearest stop based on your location</p>'
      : '';

    setContent('<div class="section-label">Choose stop</div><div class="card">' +
      '<div class="card-header"><div class="card-header-left"><h2>'+dir.headsign+'</h2><p>'+dir.stops.length+' stops</p></div></div>' +
      note + items + '</div>');

    if (nearestIdx >= 0) {
      setTimeout(() => {
        const el = document.getElementById('stop-item-'+nearestIdx);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
  }

  function pickStop(idx) {
    const stop = state._stops[idx]; state.currentStop = stop;
    setBreadcrumb([
      `<a onclick="backToDirections()">Route ${state.routeName}</a>`,
      `<a onclick="backToStops()">${state.direction.headsign}</a>`,
      '<span>'+stop.name+'</span>'
    ]);
    loadArrivals(stop);
  }

  function backToStops() {
    stopRefresh();
    setBreadcrumb([`<a onclick="backToDirections()">Route ${state.routeName}</a>`, '<span>'+state.direction.headsign+'</span>']);
    showStops(state.direction, null, null);
  }

  // ── Arrivals ──────────────────────────────────────────────────────────────
  async function loadArrivals(stop) {
    stopRefresh(); state.currentStop = stop;
    loading('Loading arrivals for '+stop.name+'…');
    try {
      const data = await apiFetch(API+'/arrivals?route='+encodeURIComponent(state.routeId||'')+'&stop='+encodeURIComponent(stop.stop_id)+'&stop_name='+encodeURIComponent(stop.name||''));
      showArrivals(data, stop);
      startRefresh(stop);
    } catch(e) {
      setContent('<div class="err">Could not load arrivals.<br><small>'+e.message+'</small></div>');
    }
  }

  function showArrivals(data, stop) {
    const favved = isFav(stop.stop_id, state.routeId);

    let rows = '';
    if (!data.arrivals || !data.arrivals.length) {
      rows = '<div class="arrival-row"><div><div class="arrival-dest">No arrivals found</div><div class="arrival-detail">Service may not be running right now</div></div></div>';
    } else {
      rows = data.arrivals.map(a => {
        const mins = a.minutes ?? 0;
        const cls  = mins<=1?'t-now':mins<=5?'t-soon':mins<=15?'t-ok':'t-later';
        const label = mins<=1 ? 'Now' : mins+' min';
        const badge = a.scheduled ? '<span class="badge badge-sched">Sched</span>' : '<span class="badge badge-live">Live</span>';
        return `<div class="arrival-row">
          <div>
            <div class="arrival-route">${a.icon} ${a.short_name}</div>
            <div class="arrival-dest">${a.headsign} ${badge}</div>
          </div>
          <div class="arrival-time ${cls}">${label}</div>
        </div>`;
      }).join('');
    }

    setContent(
      '<div class="section-label">Live arrivals</div>' +
      '<div class="card">' +
        '<div class="card-header">' +
          '<div class="card-header-left"><h2>📍 '+stop.name+'</h2><p>Route '+state.routeName+(state.direction?' · '+state.direction.headsign:'')+'</p></div>' +
          '<button class="fav-btn" onclick="handleFav()" title="'+(favved?'Remove':'Add')+' favourite">'+(favved?'⭐':'☆')+'</button>' +
        '</div>' +
        rows +
        '<div class="progress-bar"><div class="progress-fill" id="progress" style="width:100%"></div></div>' +
        '<div class="refresh-bar"><span id="refresh-label">Refreshes in '+REFRESH_INTERVAL+'s</span><button onclick="loadArrivals(state.currentStop)">↻ Refresh now</button></div>' +
      '</div>'
    );
  }

  function handleFav() {
    if (!state.currentStop) return;
    toggleFav(state.currentStop, state.routeId, state.routeName, state.direction?.headsign||'');
    loadArrivals(state.currentStop);
  }

  // ── Auto-refresh ──────────────────────────────────────────────────────────
  function startRefresh(stop) {
    stopRefresh(); refreshCountdown = REFRESH_INTERVAL;
    refreshTimer = setInterval(() => {
      refreshCountdown--;
      const lbl = document.getElementById('refresh-label');
      const bar = document.getElementById('progress');
      if (lbl) lbl.textContent = 'Refreshes in '+refreshCountdown+'s';
      if (bar) bar.style.width = ((refreshCountdown/REFRESH_INTERVAL)*100)+'%';
      if (refreshCountdown <= 0) loadArrivals(stop);
    }, 1000);
  }

  function stopRefresh() { if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; } }
</script>
</body>
</html>
